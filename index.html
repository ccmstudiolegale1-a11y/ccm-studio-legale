<!DOCTYPE html>
<html lang="it" class="scroll-smooth">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CCM Studio Legale | Sito in Lavorazione</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />

    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#0A2B43",
                        "secondary": "#a38757", /* Oro/bronzo lussuoso raffinato */
                        "secondary-hover": "#8c7247",
                        "surface": "#fbfbfb",
                        "surface-alt": "#f3f4f6",
                        "text-main": "#1a1a1a",
                        "text-muted": "#666666",
                    },
                    fontFamily: {
                        "headline": ["'Playfair Display'", "serif"],
                        "body": ["'Inter'", "sans-serif"],
                        "label": ["'Inter'", "sans-serif"]
                    },
                    transitionTimingFunction: {
                        'luxury': 'cubic-bezier(0.16, 1, 0.3, 1)',
                    }
                },
            },
        }
    </script>

    <!-- CSS Personalizzato per Animazioni e Rifiniture -->
    <style>
        /* Animazioni di Rivelazione allo Scorrimento (e caricamento) */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }

        /* Sfondo animato gradiente */
        .bg-gradient-animate {
            background: linear-gradient(-45deg, #0A2B43, #0A2B43, #0A2B43, #222222);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

<body class="bg-primary text-text-main font-body antialiased selection:bg-secondary selection:text-white">

    <main>
        <!-- Sezione Hero (A Tutto Schermo: h-screen) -->
        <section class="relative h-screen min-h-[600px] flex items-center justify-center overflow-hidden bg-gradient-animate border-b-8 border-secondary">
            <!-- Sovrapposizione Gradiente -->
            <div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-secondary/10 via-transparent to-transparent"></div>

            <div class="relative z-10 max-w-7xl mx-auto px-6 lg:px-12 w-full">
                <div class="max-w-4xl mx-auto text-center flex flex-col items-center justify-center">
                    
                    <!-- Logo Animato -->
                    <div class="reveal active mb-10">
                        <img src="logo.png" alt="CCM Studio Legale" class="h-24 md:h-32 w-auto filter brightness-0 invert opacity-90 transition-all duration-500 hover:opacity-100">
                    </div>

                    <span class="block text-secondary text-[10px] md:text-[11px] uppercase tracking-[0.3em] font-medium mb-6 md:mb-8 reveal active delay-100">
                        CCM Studio Legale
                    </span>
                    
                    <h1 class="font-headline text-5xl md:text-7xl lg:text-8xl text-white leading-[1.1] md:leading-[1.05] mb-8 md:mb-10 tracking-tight reveal active delay-200">
                        Sito in Lavorazione <br class="hidden md:block">
                        <span class="italic font-light text-white/90 text-3xl md:text-5xl mt-4 block">Tornate a trovarci presto.</span>
                    </h1>
                    
                    <div class="flex flex-col md:flex-row items-center justify-center space-y-6 md:space-y-0 md:space-x-8 reveal active delay-300 w-full md:w-auto mt-8">
                        <a href="mailto:ccmstudiolegale1@gmail.com" class="w-full md:w-auto bg-secondary text-white px-10 py-4 text-[11px] uppercase tracking-[0.15em] font-medium hover:bg-white hover:text-primary transition-all duration-500">
                            Contattaci
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- JavaScript per Interazioni -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Animazione iniziale al caricamento
            const revealElements = document.querySelectorAll('.reveal');
            setTimeout(() => {
                revealElements.forEach(el => el.classList.add('active'));
            }, 100);
        });
    </script>
</body>

</html>
